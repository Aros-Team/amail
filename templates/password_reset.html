<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer contraseña</title>
</head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background-color: #f7f8f9">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background-color: #B5DEDB; padding: 0.5rem">
        <h1 style="color: #333; margin-left: 1rem; font-size: 1.5rem">Restablecer contraseña</h1>
        <img style="margin-top: 0.30rem" src="https://storage.googleapis.com/aros-static/aros.ico" alt="AROS" width="60">
    </div>
    <p style="color: #333; font-size: 16px;">{{ message }}</p>
    <br>
    {% if reset_link %}
    <div style="text-align: center; margin: 20px 0;">
        <a href="{{ reset_link }}" style="display: inline-block; background-color: #B1DEDB; color: #333; padding: 15px 30px; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 16px;">Restablecer contraseña</a>
    </div>
    <br>
    {% endif %}
    <p style="color: #333; font-size: 10px;">Este token expira en <strong>{{ expiry }}</strong></p>
    {% if notification %}
    <div style="background-color: #B5DEDB; padding: 15px; border-radius: 5px; margin-top: 20px;">
        <p style="margin: 0; color: #333; font-size: 14px;">{{ notification.message }}</p>
    </div>
    {% endif %}
    <div style="margin-top: 30px; padding-top: 15px; border-top: 1px solid #a3a1a1">
        <p style="margin: 0; color: #333; font-size: 14px; text-align: center;">¿Necesitas ayuda? Contáctanos en <a href="mailto:support@aros.services" style="color: #B1DEDB;">support@aros.services</a></p>
    </div>
</body>
</html>
