<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer contraseña</title>
</head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
    <div style="text-align: center; margin-bottom: 30px;">
        <img src="https://landing.aros.services/aros.ico" alt="AROS" width="80">
    </div>
    <h1 style="color: #B1DEDB;">Restablecer contraseña</h1>
    <p style="color: #666; font-size: 16px;">{{ message }}</p>
    {% if reset_link %}
    <div style="text-align: center; margin: 20px 0;">
        <a href="{{ reset_link }}" style="display: inline-block; background-color: #B1DEDB; color: #333; padding: 15px 30px; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 16px;">Restablecer contraseña</a>
    </div>
    {% endif %}
    <p style="color: #888; font-size: 14px;">Este token expire en <strong>{{ expiry }}</strong>.</p>
    {% if notification %}
    <div style="background-color: #fff3cd; padding: 15px; border-radius: 5px; margin-top: 20px;">
        <p style="margin: 0; color: #856404; font-size: 14px;">{{ notification.message }}</p>
    </div>
    {% endif %}
    <div style="background-color: #f5f5f5; padding: 15px; border-radius: 5px; margin-top: 20px;">
        <p style="margin: 0; color: #888; font-size: 14px;">Equipo de AROS</p>
    </div>
    <div style="margin-top: 30px; padding-top: 15px; border-top: 1px solid #eee;">
        <p style="margin: 0; color: #888; font-size: 14px; text-align: center;">¿Necesitas ayuda? Contáctanos en <a href="mailto:support@aros.services" style="color: #B1DEDB;">support@aros.services</a></p>
    </div>
</body>
</html>
