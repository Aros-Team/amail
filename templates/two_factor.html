<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Código de verificación</title>
</head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
    <div style="text-align: center; margin-bottom: 30px;">
        <img src="https://landing.aros.services/aros.ico" alt="AROS" width="80">
    </div>
    <h1 style="color: #B1DEDB; text-align: center;">Código de verificación</h1>
    <p style="color: #666; font-size: 16px; text-align: center;">Usa el siguiente código para completar tu verificación:</p>
    <div style="background-color: #f5f5f5; padding: 20px; border-radius: 8px; text-align: center; margin: 30px 0;">
        <span style="font-size: 36px; font-weight: bold; color: #B1DEDB; letter-spacing: 8px;">{{ code }}</span>
    </div>
    {% if expiry %}
    <p style="color: #888; font-size: 14px; text-align: center;">Este código expira en {{ expiry }} minutos</p>
    {% endif %}
    <p style="color: #888; font-size: 14px; text-align: center;">Si no solicitaste este código, puedes ignorarlo con seguridad.</p>
    <div style="margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee;">
        <p style="margin: 0; color: #888; font-size: 14px; text-align: center;">¿Necesitas ayuda? Contáctanos en <a href="mailto:support@aros.services" style="color: #B1DEDB;">support@aros.services</a></p>
    </div>
</body>
</html>
