# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'


tasks:
  run:
    desc: Run application
    cmds:
      - uvicorn app.main:app --reload --port 8000
    silent: true

  build:
    desc: Build application
    cmds:
      - task lint
      - docker build -t amail:latest .

  lint:
    desc: Run linter
    cmds:
      - ruff check . --fix

  compose:up:
    desc: Start monitoring services (Prometheus, Grafana)
    cmds:
      - docker compose up -d
    status:
      - docker compose ps

  compose:down:
    desc: Stop monitoring services
    cmds:
      - docker compose down

  compose:logs:
    desc: View monitoring services logs
    cmds:
      - docker compose logs -f
